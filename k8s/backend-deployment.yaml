apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: roadwatch
spec:
  replicas: 1
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      imagePullSecrets:
      - name: gitlab-registry
      containers:
      - name: backend
        image: registry.gitlab.com/fatikasraoui2003/nid-de-poule-website/backend:latest
        ports:
        - containerPort: 8080
        volumeMounts:
        - name: firebase-key
          mountPath: /app/resources
          readOnly: true
      volumes:
      - name: firebase-key
        secret:
          secretName: firebase-key
---
apiVersion: v1
kind: Service
metadata:
  name: backend-service
  namespace: roadwatch
spec:
  selector:
    app: backend
  ports:
  - port: 8080
    targetPort: 8080
  type: ClusterIP

include:
  - template: Security/SAST.gitlab-ci.yml
stages:
  - test
  - build
  - security
  - deploy
variables:
  DOCKER_DRIVER: overlay2
  BACKEND_IMAGE: $CI_REGISTRY_IMAGE/backend:$CI_COMMIT_SHORT_SHA
  FRONTEND_IMAGE: $CI_REGISTRY_IMAGE/frontend:$CI_COMMIT_SHORT_SHA
test-backend:
  stage: test
  image: maven:3.9-eclipse-temurin-21
  before_script:
    - mkdir -p backend/src/main/resources
    - cp $FIREBASE_KEY_JSON backend/src/main/resources/serviceAccountKey.json
  script:
    - cd backend
    - mvn test -Dspring.profiles.active=test -q
  artifacts:
    reports:
      junit: backend/target/surefire-reports/TEST-*.xml
test-frontend:
  stage: test
  image: node:20-alpine
  script:
    - cd frontend
    - npm ci --legacy-peer-deps
    - npm test
build-backend:
  stage: build
  image: docker:24
  services:
    - docker:24-dind
  before_script:
    - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY
  script:
    - docker build -t $BACKEND_IMAGE ./backend
    - docker push $BACKEND_IMAGE
    - docker tag $BACKEND_IMAGE $CI_REGISTRY_IMAGE/backend:latest
    - docker push $CI_REGISTRY_IMAGE/backend:latest
  only:
    - main
build-frontend:
  stage: build
  image: docker:24
  services:
    - docker:24-dind
  before_script:
    - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY
  script:
    - docker build -t $FRONTEND_IMAGE ./frontend
    - docker push $FRONTEND_IMAGE
    - docker tag $FRONTEND_IMAGE $CI_REGISTRY_IMAGE/frontend:latest
    - docker push $CI_REGISTRY_IMAGE/frontend:latest
  only:
    - main
trivy-backend:
  stage: security
  image:
    name: aquasec/trivy:latest
    entrypoint: [""]
  variables:
    TRIVY_USERNAME: $CI_REGISTRY_USER
    TRIVY_PASSWORD: $CI_REGISTRY_PASSWORD
  script:
    - trivy image --exit-code 0 --severity CRITICAL,HIGH $BACKEND_IMAGE
  only:
    - main
trivy-frontend:
  stage: security
  image:
    name: aquasec/trivy:latest
    entrypoint: [""]
  variables:
    TRIVY_USERNAME: $CI_REGISTRY_USER
    TRIVY_PASSWORD: $CI_REGISTRY_PASSWORD
  script:
    - trivy image --exit-code 0 --severity CRITICAL,HIGH $FRONTEND_IMAGE
  only:
    - main
deploy:
  stage: deploy
  image: ubuntu:22.04
  before_script:
    - apt-get update -qq && apt-get install -y -qq curl iptables
    - curl -fsSL https://tailscale.com/install.sh | sh
    - tailscaled --tun=userspace-networking --socks5-server=localhost:1055 &
    - sleep 5
    - tailscale up --authkey=$TAILSCALE_AUTH_KEY --hostname=gitlab-runner --accept-routes
    - sleep 5
    - curl -LO "https://dl.k8s.io/release/$(curl -Ls https://dl.k8s.io/release/stable.txt)/bin/linux/amd64/kubectl"
    - chmod +x kubectl && mv kubectl /usr/local/bin/
    - mkdir -p ~/.kube
    - mkdir -p ~/.kube && cp $KUBE_CONFIG ~/.kube/config
    - kubectl config view
  script:
    - kubectl create secret generic firebase-key --from-file=serviceAccountKey.json=$FIREBASE_KEY_JSON --namespace=roadwatch --dry-run=client -o yaml | kubectl apply -f -
    - kubectl create secret docker-registry gitlab-registry --docker-server=registry.gitlab.com --docker-username=$CI_REGISTRY_USER --docker-password=$CI_REGISTRY_PASSWORD --namespace=roadwatch --dry-run=client -o yaml | kubectl apply -f -
    - kubectl apply -f k8s/ --validate=false
    - kubectl set image deployment/backend backend=$BACKEND_IMAGE -n roadwatch
    - kubectl set image deployment/frontend frontend=$FRONTEND_IMAGE -n roadwatch
    - kubectl rollout status deployment/backend -n roadwatch --timeout=600s
    - kubectl rollout status deployment/frontend -n roadwatch --timeout=600s
  only:
    - main

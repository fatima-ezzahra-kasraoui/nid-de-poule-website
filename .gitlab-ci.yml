include:
  - template: Security/SAST.gitlab-ci.yml
stages:
  - test
  - build
  - security
  - deploy
variables:
  DOCKER_DRIVER: overlay2
  BACKEND_IMAGE: $CI_REGISTRY_IMAGE/backend:$CI_COMMIT_SHORT_SHA
  FRONTEND_IMAGE: $CI_REGISTRY_IMAGE/frontend:$CI_COMMIT_SHORT_SHA
test-backend:
  stage: test
  image: maven:3.9-eclipse-temurin-21
  before_script:
    - mkdir -p backend/src/main/resources
    - cp $FIREBASE_KEY_JSON backend/src/main/resources/serviceAccountKey.json
  script:
    - cd backend
    - mvn test -Dspring.profiles.active=test -q
  artifacts:
    reports:
      junit: backend/target/surefire-reports/TEST-*.xml
test-frontend:
  stage: test
  image: node:20-alpine
  script:
    - cd frontend
    - npm ci --legacy-peer-deps
    - npm test
build-backend:
  stage: build
  image: docker:24
  services:
    - docker:24-dind
  before_script:
    - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY
  script:
    - docker build -t $BACKEND_IMAGE ./backend
    - docker push $BACKEND_IMAGE
  only:
    - main
build-frontend:
  stage: build
  image: docker:24
  services:
    - docker:24-dind
  before_script:
    - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY
  script:
    - docker build -t $FRONTEND_IMAGE ./frontend
    - docker push $FRONTEND_IMAGE
  only:
    - main
trivy-backend:
  stage: security
  image:
    name: aquasec/trivy:latest
    entrypoint: [""]
  variables:
    TRIVY_USERNAME: $CI_REGISTRY_USER
    TRIVY_PASSWORD: $CI_REGISTRY_PASSWORD
  script:
    - trivy image --exit-code 0 --severity CRITICAL,HIGH $BACKEND_IMAGE
  only:
    - main
trivy-frontend:
  stage: security
  image:
    name: aquasec/trivy:latest
    entrypoint: [""]
  variables:
    TRIVY_USERNAME: $CI_REGISTRY_USER
    TRIVY_PASSWORD: $CI_REGISTRY_PASSWORD
  script:
    - trivy image --exit-code 0 --severity CRITICAL,HIGH $FRONTEND_IMAGE
  only:
    - main
deploy:
  stage: deploy
  image: bitnami/kubectl:latest
  before_script:
    - mkdir -p ~/.kube
    - echo "$KUBE_CONFIG" | base64 -d > ~/.kube/config
  script:
    - kubectl apply -f k8s/
    - kubectl set image deployment/backend backend=$BACKEND_IMAGE -n roadwatch
    - kubectl set image deployment/frontend frontend=$FRONTEND_IMAGE -n roadwatch
    - kubectl rollout status deployment/backend -n roadwatch --timeout=120s
    - kubectl rollout status deployment/frontend -n roadwatch --timeout=120s
  only:
    - main
